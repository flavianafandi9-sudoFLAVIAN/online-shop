<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Online Shop</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        header {
            background: #333;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 1.5rem;
        }
        .cart-icon {
            cursor: pointer;
            background: #ff9800;
            color: #333;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .product-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            text-align: center;
        }
        .product-card img {
            max-width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }
        .product-card h3 {
            margin: 15px 0 10px;
        }
        .product-card p {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .product-card button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        .product-card button:hover {
            background: #218838;
        }
        /* Cart Modal (simple overlay) */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .cart-content {
            background: #fff;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            border-radius: 5px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .cart-content h2 {
            margin-bottom: 20px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
        }
        .cart-item-info {
            flex: 2;
        }
        .cart-item-actions button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 5px;
        }
        .cart-item-actions button.increase {
            background: #007bff;
        }
        .cart-total {
            text-align: right;
            font-size: 1.2rem;
            margin: 20px 0;
        }
        .cart-buttons {
            display: flex;
            justify-content: space-between;
        }
        .cart-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-close {
            background: #6c757d;
            color: white;
        }
        .btn-checkout {
            background: #28a745;
            color: white;
        }
        .btn-clear {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>Simple Shop</h1>
    <div class="cart-icon" id="cart-icon">Cart (<span id="cart-count">0</span>)</div>
</header>

<!-- Product Grid -->
<main class="product-grid" id="product-grid"></main>

<!-- Cart Modal -->
<div class="cart-modal" id="cart-modal">
    <div class="cart-content">
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <div class="cart-total">
            Total:$<span id="cart-total">0.00</span>
        </div>
        <div class="cart-buttons">
            <button class="btn-close" id="close-cart">Continue Shopping</button>
            <button class="btn-clear" id="clear-cart">Clear Cart</button>
            <button class="btn-checkout" id="checkout">Checkout</button>
        </div>
    </div>
</div>

<script>
    // ---------- PRODUCT DATA (you can replace with your own) ----------
    const products = [
        { id: 1, name: "Product 1", price: 500.00, image: "Butterfly Print Phone Case With Hand Strap Compati.jpeg" },
        { id: 2, name: "Product 2", price: 1500.00, image: "triple phone case.jpeg" },
        { id: 3, name: "Product 3", price: 3500.00, image: "New style mini fan.jpeg" },
        { id: 4, name: "Product 4", price: 5000.00, image: "Cat ear headphones.jpeg" },
        { id: 5, name: "Product 5", price: 1500.00, image: "airpods.jpeg" },
        { id: 6, name: "Product 6", price: 3000.00, image: "microphone.jpeg" }
    ];

    // ---------- CART (initialized from localStorage) ----------
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    // ---------- DOM Elements ----------
    const productGrid = document.getElementById('product-grid');
    const cartIcon = document.getElementById('cart-icon');
    const cartModal = document.getElementById('cart-modal');
    const closeCart = document.getElementById('close-cart');
    const clearCartBtn = document.getElementById('clear-cart');
    const checkoutBtn = document.getElementById('checkout');
    const cartItemsDiv = document.getElementById('cart-items');
    const cartTotalSpan = document.getElementById('cart-total');
    const cartCountSpan = document.getElementById('cart-count');

    // ---------- Render Product Grid ----------
    function renderProducts() {
        productGrid.innerHTML = '';
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${product.image}" alt="${product.name}">
                <h3>${product.name}</h3>
                <p>$${product.price.toFixed(2)}</p>
                <button onclick="addToCart(${product.id})">Add to Cart</button>
            `;
            productGrid.appendChild(card);
        });
    }

    // ---------- Add to Cart ----------
    window.addToCart = function(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;

        const existingItem = cart.find(item => item.id === productId);
        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            cart.push({ ...product, quantity: 1 });
        }

        updateCart();
    };

    // ---------- Update Cart (save to localStorage, refresh UI) ----------
    function updateCart() {
        // Save to localStorage
        localStorage.setItem('cart', JSON.stringify(cart));

        // Update cart count in header
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        cartCountSpan.textContent = totalItems;

        // If modal is open, refresh cart display
        if (cartModal.style.display === 'flex') {
            displayCartItems();
        }
    }

    // ---------- Display Cart Items in Modal ----------
    function displayCartItems() {
        if (cart.length === 0) {
            cartItemsDiv.innerHTML = '<p>Your cart is empty.</p>';
            cartTotalSpan.textContent = '0.00';
            return;
        }

        let html = '';
        let total = 0;

        cart.forEach(item => {
            total += item.price * item.quantity;
            html += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <strong>${item.name}</strong><br>
                        $${item.price.toFixed(2)} x ${item.quantity}
                    </div>
                    <div class="cart-item-actions">
                        <button class="increase" onclick="updateQuantity(${item.id}, 1)">+</button>
                        <button onclick="updateQuantity(${item.id}, -1)">-</button>
                        <button onclick="removeFromCart(${item.id})">Remove</button>
                    </div>
                </div>
            `;
        });

        cartItemsDiv.innerHTML = html;
        cartTotalSpan.textContent = total.toFixed(2);
    }

    // ---------- Update Quantity (increase / decrease) ----------
    window.updateQuantity = function(productId, change) {
        const item = cart.find(i => i.id === productId);
        if (!item) return;

        item.quantity += change;

        if (item.quantity <= 0) {
            removeFromCart(productId);
        } else {
            updateCart();
        }
    };

    // ---------- Remove Item from Cart ----------
    window.removeFromCart = function(productId) {
        cart = cart.filter(item => item.id !== productId);
        updateCart();
    };

    // ---------- Clear Entire Cart ----------
    function clearCart() {
        cart = [];
        updateCart();
        displayCartItems(); // refresh modal if open
    }

    // ---------- Checkout (simulate) ----------
    function checkout() {
        if (cart.length === 0) {
            alert('Your cart is empty!');
            return;
        }
        alert('Thank you for your purchase! (This is a demo – no payment processed.)');
        clearCart();
        cartModal.style.display = 'none';
    }

    // ---------- Event Listeners ----------
    cartIcon.addEventListener('click', () => {
        displayCartItems();
        cartModal.style.display = 'flex';
    });

    closeCart.addEventListener('click', () => {
        cartModal.style.display = 'none';
    });

    clearCartBtn.addEventListener('click', () => {
        clearCart();
    });

    checkoutBtn.addEventListener('click', () => {
        checkout();
    });

    // Close modal when clicking outside the content (optional)
    cartModal.addEventListener('click', (e) => {
        if (e.target === cartModal) {
            cartModal.style.display = 'none';
        }
    });

    // ---------- Initialize ----------
    renderProducts();
    updateCart(); // to set correct cart count on page load
</script>

</body>
</html>
